<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动漫资讯 - 哈哈动漫网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #fff;
            min-width: 320px;
        }
        
        a {
            text-decoration: none;
            color: inherit;
        }
        
        ul {
            list-style: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* 头部区域 */
        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        
        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 2px 2px 4px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo span {
            color: #fff;
        }
        
        .search-box {
            flex: 1;
            max-width: 450px;
            display: flex;
        }
        
        .search-box input {
            flex: 1;
            padding: 10px 18px;
            border: none;
            border-radius: 25px 0 0 25px;
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .search-box button {
            padding: 10px 25px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-radius: 0 25px 25px 0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .search-box button:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* 导航 */
        .nav {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(10px);
            overflow-x: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .nav-list {
            display: flex;
            padding: 0 15px;
        }
        
        .nav-list li {
            flex-shrink: 0;
        }
        
        .nav-list a {
            display: block;
            padding: 14px 20px;
            color: #ccc;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
        }
        
        .nav-list a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: all 0.3s;
            transform: translateX(-50%);
        }
        
        .nav-list a:hover {
            color: #ffd700;
        }
        
        .nav-list a:hover::after,
        .nav-list a.active::after {
            width: 80%;
        }
        
        .nav-list a.active {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        /* 页面标题 */
        .page-header {
            padding: 35px 0 25px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .page-header h1 {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        
        .page-header p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* 内容区域 */
        .content {
            background: rgba(22, 33, 62, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .news-item {
            background: rgba(15, 52, 96, 0.6);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .news-item:hover {
            background: rgba(15, 52, 96, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .news-title {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .news-meta {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }
        
        .news-summary {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }
        
        /* 页脚 */
        .footer {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px 0 25px;
            margin-top: 50px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .footer-content {
            text-align: center;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .footer-links a {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .footer-links a:hover {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .footer p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .footer .copyright {
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header-top {
                flex-wrap: wrap;
            }
            
            .logo {
                font-size: 22px;
            }
            
            .search-box {
                order: 3;
                max-width: 100%;
                width: 100%;
                margin-top: 10px;
            }
            
            .page-header h1 {
                font-size: 28px;
            }
            
            .page-header p {
                font-size: 14px;
            }
            
            .nav-list a {
                padding: 12px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部区域 -->
    <header class="header">
        <div class="container">
            <div class="header-top">
                <a href="/animation/index.html" class="logo">🎬 哈哈<span>动漫</span></a>
                <div class="search-box">
                    <input type="text" placeholder="搜索动漫资讯...">
                    <button> 搜索</button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- 导航 -->
    <nav class="nav">
        <ul class="nav-list container">
            <li><a href="/animation/index.html"> 首页</a></li>
            <li><a href="/animation/japanese.html"> 日本动漫</a></li>
            <li><a href="/animation/chinese.html"> 国产动漫</a></li>
            <li><a href="/animation/western.html"> 欧美动漫</a></li>
            <li><a href="/animation/movies.html"> 电影</a></li>
            <li><a href="tv.html"> 电视剧</a></li>
            <li><a href="variety.html"> 综艺</a></li>
            <li><a href="documentary.html"> 纪录片</a></li>
            <li><a href="/anime/news" class="active"> 资讯</a></li>
            <li><a href="/anime/rankings"> 排行榜</a></li>
        </ul>
    </nav>
    
    <!-- 主内容区域 -->
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1>动漫资讯</h1>
            <p>最新动漫动态、行业新闻、作品资讯、声优访谈、制作情报，第一时间掌握动漫圈最新消息</p>
        </div>
        
        <!-- 资讯列表 -->
        <div class="content">
            <div class="news-list" id="news-list">
                <div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)">加载中...</div>
            </div>
        </div>
        
        <!-- 分页 -->
        <div id="pagination" style="display: flex; justify-content: center; margin-top: 30px; gap: 8px;"></div>
    </div>
    
    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="/aaa">首页</a>
                    <a href="/anime/japanese">日本动漫</a>
                    <a href="/anime/chinese">国产动漫</a>
                    <a href="/anime/rankings">排行榜</a>
                </div>
                <p>哈哈动漫网 - 免费高清动漫在线观看</p>
                <p class="copyright">© 2025 hahaAnimation. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script>
        // ==================== 工具函数 ====================
        let currentCategory = '全部';
        let currentPage = 1;
        let totalPages = 1;

        function formatDate(str) {
            if (!str) return '';
            return new Date(str).toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
        }

        function formatCount(n) {
            if (!n) return '0';
            if (n >= 10000) return (n/10000).toFixed(1)+'万';
            return String(n);
        }

        // ==================== 加载新闻 ====================
        async function loadNews(category, page) {
            const list = document.getElementById('news-list');
            list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)">加载中...</div>';
            try {
                const params = new URLSearchParams({ category: category||'全部', page: page||1, size: 10 });
                const res = await fetch('/api/anime/news?' + params);
                const json = await res.json();
                if (json.code === 200 && json.data) {
                    const data = json.data;
                    totalPages = data.pages;
                    currentPage = page;
                    renderNews(data.records);
                    renderPagination(data.pages, page);
                }
            } catch(e) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)">加载失败，请刷新重试</div>';
            }
        }

        function renderNews(records) {
            const list = document.getElementById('news-list');
            if (!records || !records.length) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)">暂无资讯</div>';
                return;
            }
            list.innerHTML = records.map(news => `
                <div class="news-item" onclick="openNews(${news.id})" style="cursor:pointer;padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);transition:background .2s;border-radius:8px"
                     onmouseover="this.style.background='rgba(102,126,234,0.08)'" onmouseout="this.style.background=''">
                    <div style="display:flex;gap:16px">
                        ${news.coverImage ? `<img src="${news.coverImage}" alt="${news.title}" style="width:120px;height:80px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'">` : ''}
                        <div style="flex:1">
                            <h3 class="news-title" style="font-size:16px;font-weight:600;color:#fff;margin-bottom:8px;line-height:1.5">${news.title}</h3>
                            <div class="news-meta" style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px">
                                ${formatDate(news.publishTime)} ｜ 来源：${news.source||'哈哈动漫'} ｜ 分类：${news.category||'资讯'} ｜ ${formatCount(news.viewCount)} 浏览
                            </div>
                            <p class="news-summary" style="font-size:13px;color:rgba(255,255,255,0.65);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${news.summary||''}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderPagination(total, current) {
            const pg = document.getElementById('pagination');
            if (!pg || total <= 1) { if(pg) pg.innerHTML=''; return; }
            const pageStyle = (active) => `style="padding:10px 16px;background:${active?'linear-gradient(135deg,#667eea,#764ba2)':'rgba(22,33,62,0.8)'};border-radius:8px;cursor:pointer;border:1px solid ${active?'#ffd700':'rgba(102,126,234,0.2)'}"`;
            let html = `<span ${pageStyle(false)} onclick="changePage(${Math.max(1,current-1)})">‹</span>`;
            for (let i = 1; i <= Math.min(total, 8); i++) {
                html += `<span ${pageStyle(i===current)} onclick="changePage(${i})">${i}</span>`;
            }
            html += `<span ${pageStyle(false)} onclick="changePage(${Math.min(total,current+1)})">›</span>`;
            pg.innerHTML = html;
        }

        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            loadNews(currentCategory, page);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function openNews(id) {
            // 跳转到资讯详情（暂时弹窗显示，后续可做详情页）
            window.location.href = `/anime/news?id=${id}`;
        }

        // ==================== 分类筛选 ====================
        const categoryTabs = document.querySelectorAll('.news-tab, .category-tab, [data-category]');
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                categoryTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.getAttribute('data-category') || this.textContent.trim();
                loadNews(currentCategory, 1);
            });
        });

        // ==================== 搜索 ====================
        const searchBtn = document.querySelector('.search-box button');
        const searchInput = document.querySelector('.search-box input');
        function doSearch() {
            const kw = searchInput && searchInput.value.trim();
            if (!kw) return;
            window.location.href = `/anime/japanese?keyword=${encodeURIComponent(kw)}`;
        }
        if (searchBtn) searchBtn.addEventListener('click', doSearch);
        if (searchInput) searchInput.addEventListener('keypress', e => e.key==='Enter' && doSearch());

        // ==================== 初始加载 ====================
        // 检查URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id');
        if (newsId) {
            // 如果有id参数，显示单条新闻详情（简化处理：加载列表并高亮）
            loadNews('全部', 1);
        } else {
            loadNews('全部', 1);
        }
    </script>
</body>
</html>
